name: Trigger Azure ML Job

on:
  workflow_dispatch:        # 👈 manual trigger (good for testing)
  push:                     # 👈 also auto-trigger on push to main
    branches:
      - main

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Check out repo
        uses: actions/checkout@v4

      # Step 2: Sign in to Azure using the service principal stored as secret
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 3: Install the Azure ML CLI extension
      - name: Install Azure ML CLI extension
        run: az extension add --name ml --upgrade --yes

      # Step 4: Trigger the Azure ML job
      - name: Run Azure ML job
        run: az ml job create --file src/job.yml --resource-group ai_300 --workspace-name azure-automl
