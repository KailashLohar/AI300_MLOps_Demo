name: Train Model on Merge to Main

on:
  push:
    branches:
      - main      # 🔑 fires when PR is merged into main
  workflow_dispatch:   # also allow manual runs

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI extension
        run: az extension add --name ml --upgrade --yes

      - name: Run Azure ML job
        run: |
          az ml job create \
            --file src/job.yml \
            --resource-group ai_300 \
            --workspace-name azure-automl
